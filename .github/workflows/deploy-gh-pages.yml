name: Deploy static site to gh-pages branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build static site
        run: GITHUB_PAGES=true npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_BUILD_VERSION: ${{ github.run_id }}

      - name: Add SPA fallback
        run: |
          if [ -f out/ru/index.html ]; then
            cp out/ru/index.html out/404.html
          fi
          # Prevent stale HTML shell from pinning old JS bundles in browsers
          find out -name "*.html" -print0 | while IFS= read -r -d '' file; do
            sed -i 's|<head>|<head><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" /><meta http-equiv="Pragma" content="no-cache" /><meta http-equiv="Expires" content="0" />|' "$file"
          done
          BUILD_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "build=${BUILD_TS}" > out/build-version.txt
          echo "${BUILD_TS}" > out/build-id.txt

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true
